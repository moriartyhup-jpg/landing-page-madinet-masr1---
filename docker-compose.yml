services:
  madinat-misr:
    image: ghcr.io/moriartyhup-jpg/madinat-masr-frontend:latest
    container_name: madinat-misr-website
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    image: ghcr.io/moriartyhup-jpg/madinat-masr-backend:latest
    container_name: madinat-misr-backend
    volumes:
      - django-db-data:/app/db
    expose:
      - "8000"
    restart: unless-stopped

volumes:
  django-db-data:
